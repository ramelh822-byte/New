<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planet Leads Academy — Master Any Skill With AI Guidance</title>
  <meta name="description" content="Personalized AI-powered courses that adapt to your learning style. From languages to programming, faith to business — grow at your own pace." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06090f;
      --bg2: #0c1120;
      --bg3: #111827;
      --card: #0f1726;
      --border: rgba(99,179,237,0.12);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --gold: #fbbf24;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #34d399;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── STARS BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 85%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 65% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 45%, rgba(255,255,255,.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 68px;
      background: rgba(6,9,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span.globe { font-size: 1.4rem; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      transition: color .2s;
    }

    .nav-links a:hover { color: var(--text); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .btn-ghost {
      padding: .45rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }

    .btn-ghost:hover { border-color: var(--accent); background: rgba(56,189,248,.05); }

    .btn-primary {
      padding: .5rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06090f;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
    }

    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all .3s;
    }
    /* Rest of code follows... */
  </style>
</head>
</html>
